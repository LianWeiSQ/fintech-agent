# Single committed runtime config.
# To switch models later, keep editing [model_route] instead of adding more
# demo/example/local config files.

timezone = "Asia/Shanghai"
report_language = "zh-CN"
database_path = "artifacts/fitech_agent.db"
report_dir = "artifacts/reports"
skill_dirs = ["skills"]

[audit]
min_verified_score = 0.65
min_publish_confidence = 0.55

[model_route]
provider = "custom"
backend = "openai_responses"
model = "gpt-5.4"
temperature = 0.1
max_output_tokens = 900
base_url = "https://codex-api.packycode.com/v1"
api_key_env = "OPENAI_API_KEY"

# Single model routing interface:
# - Third-party OpenAI-compatible Responses gateway:
#   provider = "custom"
#   backend = "openai_responses"
#   model = "gpt-5.4"
#   base_url = "https://codex-api.packycode.com/v1"
#   api_key_env = "OPENAI_API_KEY"
#   reasoning_effort = "xhigh"
# - OpenAI chat / reasoning models through LiteLLM:
#   provider = "openai"
#   backend = "litellm"
#   model = "gpt-4.1-mini"
# - Alternate OpenAI-compatible Responses gateways:
#   provider = "custom"
#   backend = "openai_responses"
#   model = "your-model-name"
#   base_url = "https://your-gateway.example/v1"
#   api_key_env = "YOUR_GATEWAY_API_KEY"

reasoning_effort = "xhigh"

# Optional per-agent overrides inherit from [model_route].
# [agent_routes.event_intelligence]
# model = "openai/gpt-5.4-mini"
# temperature = 0.0
#
# [agent_routes.market_reasoning]
# model = "openai/gpt-5.4"
# temperature = 0.2

[run_defaults]
mode = "full_report"
lookback_hours = 18

# Authority-first precious metals source pack:
# - Product-facing source hierarchy is limited to L1/L2/L3.
# - Focus is gold / silver research around rates, dollar, China policy, and CME / COMEX.
# - Some endpoints below use RSS or RSSHub internally, but product surfaces them as
#   official anchors, authoritative media, and selected X rather than "RSS subscriptions".
# - Public rsshub.app is convenient for local experiments but rate-limited; replace it in production.

# L1: official anchors
[[sources]]
name = "FedPressAll"
kind = "rss"
endpoint = "https://www.federalreserve.gov/feeds/press_all.xml"
language = "en"
tier = "official"
enabled = true
tags = ["official", "macro", "usd", "ust", "rates"]
metadata.link_allowlist_domains = ["federalreserve.gov"]
metadata.title_allowlist_keywords = ["fomc", "rate", "policy", "liquidity", "repo", "swap", "treasury", "yield", "inflation", "dollar"]

[[sources]]
name = "FedMonetaryPolicy"
kind = "rss"
endpoint = "https://www.federalreserve.gov/feeds/press_monetary.xml"
language = "en"
tier = "official"
enabled = true
tags = ["official", "macro", "usd", "ust", "rates", "precious_metals"]
metadata.link_allowlist_domains = ["federalreserve.gov"]

[[sources]]
name = "PBOCNews"
kind = "rss"
endpoint = "https://www.pbc.gov.cn/goutongjiaoliu/113456/2986536/index.html"
